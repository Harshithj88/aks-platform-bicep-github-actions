name: Deploy AKS Platform Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod

permissions:
  id-token: write
  contents: read

env:
  LOCATION: eastus

jobs:
  deploy:
    name: Deploy AKS Platform
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Set resource group name
      id: rg
      shell: bash
      run: |
        echo "resource_group=rg-srelab-${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT

    - name: Validate Bicep template
      uses: azure/arm-deploy@v2
      with:
        scope: resourcegroup
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: ${{ steps.rg.outputs.resource_group }}
        template: ./infra/bicep/main.bicep
        parameters: ./infra/bicep/params/${{ github.event.inputs.environment }}.bicepparam
        deploymentMode: Validate

    - name: Deploy Bicep template
      uses: azure/arm-deploy@v2
      with:
        scope: resourcegroup
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: ${{ steps.rg.outputs.resource_group }}
        template: ./infra/bicep/main.bicep
        parameters: ./infra/bicep/params/${{ github.event.inputs.environment }}.bicepparam
        deploymentMode: Incremental
